<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ball Arena</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="/socket.io/socket.io.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#07070f;--surface:#0f0f1e;--border:#1a1a2e;}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:#f0f0f0;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;}

/* SCREENS */
.screen{display:none;width:100%;height:100%;align-items:center;justify-content:center;flex-direction:column;}
.screen.active{display:flex;}

/* HOME */
.logo{font-family:'Bebas Neue',sans-serif;font-size:6rem;letter-spacing:8px;line-height:1;
  background:linear-gradient(135deg,#ff6b6b,#ffd93d,#6bcb77,#48dbfb);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 40px #ff6b6b60);margin-bottom:4px;}
.sub{color:#333;font-size:.85rem;letter-spacing:3px;text-transform:uppercase;margin-bottom:40px;}

.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;width:300px;margin-bottom:12px;}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;margin-bottom:14px;color:#ffd93d;}

input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;
  padding:11px 14px;color:#f0f0f0;font-family:'DM Sans',sans-serif;font-size:.9rem;
  outline:none;margin-bottom:10px;transition:border-color .2s;}
input:focus{border-color:#ffd93d;}
input::placeholder{color:#333;}

.btn{width:100%;padding:12px;border:none;border-radius:8px;cursor:pointer;
  font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;transition:all .2s;}
.btn-primary{background:linear-gradient(135deg,#ff6b6b,#ffd93d);color:#07070f;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 25px #ff6b6b50;}
.btn-ghost{background:transparent;color:#444;border:1px solid var(--border);margin-top:6px;}
.btn-ghost:hover{border-color:#ffd93d;color:#ffd93d;}
.err{color:#ff6b6b;font-size:.8rem;text-align:center;margin-top:6px;min-height:16px;}

/* COSMETICS */
.cosm-title{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;color:#aaa;margin-bottom:8px;}
.color-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.color-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;}
.color-dot:hover{transform:scale(1.15);}
.color-dot.selected{border-color:#fff;transform:scale(1.2);}

/* LOBBY */
#lobby-screen{gap:16px;}
.lobby-code-wrap{text-align:center;}
.lobby-code{font-family:'Bebas Neue',sans-serif;font-size:4rem;letter-spacing:12px;color:#ffd93d;
  text-shadow:0 0 30px #ffd93d60;border:2px dashed #ffd93d30;border-radius:12px;padding:12px 28px;}
.lobby-hint{color:#333;font-size:.8rem;margin-top:6px;letter-spacing:1px;}
.players-wrap{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;max-width:500px;}
.p-chip{padding:7px 16px;border-radius:20px;font-size:.85rem;font-weight:600;border:2px solid currentColor;}
.host-crown{font-size:.7rem;margin-left:4px;}

/* GAME */
#game-screen{position:relative;flex-direction:row;align-items:stretch;gap:0;}

#canvas-wrap{position:relative;flex:1;display:flex;align-items:center;justify-content:center;background:#07070f;}

canvas{border:2px solid #1a1a2e;border-radius:4px;display:block;}

/* HUD */
#hud{width:200px;background:var(--surface);border-left:1px solid var(--border);
  display:flex;flex-direction:column;padding:16px;gap:14px;}
.hud-section{border-bottom:1px solid var(--border);padding-bottom:14px;}
.hud-label{font-family:'Bebas Neue',sans-serif;font-size:.85rem;letter-spacing:2px;color:#444;margin-bottom:6px;}
.hud-value{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:#ffd93d;line-height:1;}
.hud-sub{font-size:.75rem;color:#333;margin-top:2px;}

/* Ultis */
.ulti-btn{
  width:100%;padding:10px;border-radius:10px;border:none;cursor:pointer;
  font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:1px;
  margin-bottom:8px;position:relative;overflow:hidden;transition:all .15s;
}
.ulti-btn:disabled{opacity:.4;cursor:not-allowed;}
.ulti-dash{background:linear-gradient(135deg,#ff6b6b,#ff4757);color:#fff;}
.ulti-freeze{background:linear-gradient(135deg,#48dbfb,#0abde3);color:#07070f;}
.ulti-btn .cd-overlay{
  position:absolute;inset:0;background:#00000080;
  display:flex;align-items:center;justify-content:center;
  font-size:.85rem;color:#fff;
}
.key-hint{font-size:.7rem;opacity:.6;margin-left:4px;}

/* Players list in HUD */
.p-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;font-size:.8rem;}
.p-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.p-dead{opacity:.3;text-decoration:line-through;}

/* XP bar */
.xp-bar{height:6px;background:#1a1a2e;border-radius:3px;overflow:hidden;margin-top:4px;}
.xp-fill{height:100%;background:linear-gradient(90deg,#6bcb77,#ffd93d);border-radius:3px;transition:width .5s;}

/* COUNTDOWN */
#countdown{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:8rem;color:#ffd93d;
  text-shadow:0 0 60px #ffd93d;pointer-events:none;z-index:10;
  animation:cdPulse .9s ease-in-out infinite alternate;
}
@keyframes cdPulse{from{transform:scale(.95);opacity:.7;}to{transform:scale(1.05);opacity:1;}}

/* DEATH overlay */
#death-overlay{
  position:absolute;inset:0;background:#00000090;
  display:none;align-items:center;justify-content:center;flex-direction:column;gap:8px;z-index:20;
}
.death-title{font-family:'Bebas Neue',sans-serif;font-size:3rem;color:#ff4757;letter-spacing:4px;text-shadow:0 0 30px #ff4757;}
.death-time{font-size:1.1rem;color:#aaa;}
.death-xp{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:#ffd93d;}

/* GAME OVER */
#gameover-screen{gap:16px;}
.go-title{font-family:'Bebas Neue',sans-serif;font-size:4rem;letter-spacing:4px;
  background:linear-gradient(135deg,#ff6b6b,#ffd93d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.scores-list{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;min-width:300px;}
.score-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border);}
.score-row:last-child{border:none;}
.score-rank{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;width:30px;color:#444;}
.score-rank.first{color:#ffd93d;}
.score-name{flex:1;font-weight:600;}
.score-time{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:#ffd93d;}
.score-xp{font-size:.8rem;color:#6bcb77;margin-left:4px;}

/* NOTIF */
.notif{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  background:#ffd93d;color:#07070f;
  font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;
  padding:8px 20px;border-radius:20px;z-index:999;
  animation:notifFade 2.5s forwards;pointer-events:none;
}
@keyframes notifFade{0%{opacity:0;top:10px;}10%{opacity:1;top:20px;}80%{opacity:1;}100%{opacity:0;}}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="home-screen">
  <div class="logo">BALL ARENA</div>
  <div class="sub">Survive. Evade. Dominate.</div>
  <div style="display:flex;gap:16px;flex-wrap:wrap;justify-content:center;">
    <div class="card">
      <div class="card-title">Créer une salle</div>
      <input id="create-name" placeholder="Ton pseudo" maxlength="12"/>
      <div class="cosm-title">Couleur de ta boule</div>
      <div class="color-grid" id="color-grid-create"></div>
      <button class="btn btn-primary" id="btn-create">Créer</button>
    </div>
    <div class="card">
      <div class="card-title">Rejoindre</div>
      <input id="join-name" placeholder="Ton pseudo" maxlength="12"/>
      <input id="join-code" placeholder="CODE" maxlength="5" style="text-transform:uppercase;letter-spacing:4px;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:1.4rem;"/>
      <button class="btn btn-primary" id="btn-join">Rejoindre</button>
    </div>
  </div>
  <div class="err" id="home-err"></div>
</div>

<!-- LOBBY -->
<div class="screen" id="lobby-screen">
  <div class="lobby-code-wrap">
    <div style="color:#333;font-size:.8rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;">CODE DE LA SALLE</div>
    <div class="lobby-code" id="lobby-code-display">XXXXX</div>
    <div class="lobby-hint">Partage ce code à tes potes</div>
  </div>
  <div class="players-wrap" id="lobby-players"></div>
  <div id="lobby-host-wrap" style="display:none;">
    <button class="btn btn-primary" id="btn-start" style="width:220px;">LANCER LA PARTIE</button>
  </div>
  <div id="lobby-wait" style="color:#333;font-size:.85rem;">En attente du host...</div>
  <div class="err" id="lobby-err"></div>
</div>

<!-- GAME -->
<div class="screen" id="game-screen">
  <div id="canvas-wrap">
    <canvas id="arena"></canvas>
    <div id="countdown" style="display:none;">3</div>
    <div id="death-overlay">
      <div class="death-title">💀 MORT</div>
      <div class="death-time" id="death-time">Survie : 0s</div>
      <div class="death-xp" id="death-xp">+0 XP</div>
      <div style="color:#333;font-size:.8rem;margin-top:8px;">En attente des autres...</div>
    </div>
  </div>
  <div id="hud">
    <div class="hud-section">
      <div class="hud-label">TEMPS</div>
      <div class="hud-value" id="hud-time">0s</div>
    </div>
    <div class="hud-section">
      <div class="hud-label">XP TOTAL</div>
      <div class="hud-value" id="hud-xp">0</div>
      <div class="xp-bar"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div>
      <div class="hud-sub" id="hud-level">Niveau 1</div>
    </div>
    <div class="hud-section">
      <div class="hud-label">ULTIS</div>
      <button class="ulti-btn ulti-dash" id="ulti1-btn">⚡ DASH <span class="key-hint">[E]</span></button>
      <button class="ulti-btn ulti-freeze" id="ulti2-btn">❄️ FREEZE <span class="key-hint">[R]</span></button>
    </div>
    <div>
      <div class="hud-label">JOUEURS</div>
      <div id="players-list"></div>
    </div>
  </div>
</div>

<!-- GAME OVER -->
<div class="screen" id="gameover-screen">
  <div class="go-title">GAME OVER</div>
  <div class="scores-list" id="scores-list"></div>
  <div id="go-host-wrap" style="display:none;margin-top:12px;">
    <button class="btn btn-primary" id="btn-restart" style="width:220px;">REJOUER</button>
  </div>
  <div id="go-wait" style="color:#333;font-size:.8rem;margin-top:12px;">En attente du host...</div>
</div>

<script>
const socket = io();
const ARENA_W = 800, ARENA_H = 600;

// Profile (localStorage)
const profile = JSON.parse(localStorage.getItem('ballArenaProfile') || '{"xp":0,"level":1,"gamesPlayed":0}');
function saveProfile() { localStorage.setItem('ballArenaProfile', JSON.stringify(profile)); }
function xpForLevel(l) { return l * 100; }
function addXP(amount) {
  profile.xp += amount;
  while (profile.xp >= xpForLevel(profile.level)) {
    profile.xp -= xpForLevel(profile.level);
    profile.level++;
    notif(`🎉 NIVEAU ${profile.level} !`);
  }
  saveProfile();
  updateXPBar();
}
function updateXPBar() {
  document.getElementById('hud-xp').textContent = profile.xp;
  document.getElementById('hud-level').textContent = `Niveau ${profile.level}`;
  document.getElementById('xp-fill').style.width = (profile.xp / xpForLevel(profile.level) * 100) + '%';
}

// State
let myId = null, myCode = null, isHost = false;
const keys = { up:false, down:false, left:false, right:false };
let selectedColor = '#ff6b6b';
let gameActive = false;
let ulti1Ready = true, ulti2Ready = true;
let ulti1Timer = 0, ulti2Timer = 0;

// Canvas
const canvas = document.getElementById('arena');
const ctx = canvas.getContext('2d');
canvas.width = ARENA_W;
canvas.height = ARENA_H;

// Color pickers
const COLORS = ['#ff6b6b','#4ecdc4','#45b7d1','#ffd93d','#6bcb77','#c77dff','#ff9f43','#48dbfb','#ff6b81','#a29bfe'];
function buildColorGrid(id) {
  const grid = document.getElementById(id);
  COLORS.forEach(c => {
    const dot = document.createElement('div');
    dot.className = 'color-dot' + (c === selectedColor ? ' selected' : '');
    dot.style.background = c;
    dot.addEventListener('click', () => {
      selectedColor = c;
      grid.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
      dot.classList.add('selected');
    });
    grid.appendChild(dot);
  });
}
buildColorGrid('color-grid-create');

// Screens
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// Home
document.getElementById('btn-create').addEventListener('click', () => {
  const name = document.getElementById('create-name').value.trim() || 'Joueur';
  socket.emit('create_room', { name, cosmetic: { color: selectedColor } });
});
document.getElementById('btn-join').addEventListener('click', () => {
  const name = document.getElementById('join-name').value.trim() || 'Joueur';
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  if (!code) return showErr('home-err', 'Entre un code !');
  socket.emit('join_room', { code, name, cosmetic: { color: selectedColor } });
});

// Lobby
document.getElementById('btn-start').addEventListener('click', () => {
  socket.emit('start_game', { code: myCode });
});

// Ultis
document.getElementById('ulti1-btn').addEventListener('click', () => useUlti1());
document.getElementById('ulti2-btn').addEventListener('click', () => useUlti2());

function useUlti1() {
  if (!ulti1Ready || !gameActive) return;
  socket.emit('ulti1', { code: myCode });
  ulti1Ready = false;
  ulti1Timer = 8;
  updateUltiBtn(1);
  const interval = setInterval(() => {
    ulti1Timer--;
    updateUltiBtn(1);
    if (ulti1Timer <= 0) { ulti1Ready = true; clearInterval(interval); updateUltiBtn(1); }
  }, 1000);
}

function useUlti2() {
  if (!ulti2Ready || !gameActive) return;
  socket.emit('ulti2', { code: myCode });
  ulti2Ready = false;
  ulti2Timer = 15;
  updateUltiBtn(2);
  const interval = setInterval(() => {
    ulti2Timer--;
    updateUltiBtn(2);
    if (ulti2Timer <= 0) { ulti2Ready = true; clearInterval(interval); updateUltiBtn(2); }
  }, 1000);
}

function updateUltiBtn(n) {
  const btn = document.getElementById(`ulti${n}-btn`);
  const timer = n === 1 ? ulti1Timer : ulti2Timer;
  const ready = n === 1 ? ulti1Ready : ulti2Ready;
  let old = btn.querySelector('.cd-overlay');
  if (old) old.remove();
  btn.disabled = !ready;
  if (!ready) {
    const ov = document.createElement('div');
    ov.className = 'cd-overlay';
    ov.textContent = timer + 's';
    btn.appendChild(ov);
  }
}

// Keys
window.addEventListener('keydown', e => {
  let changed = false;
  if (e.key==='z'||e.key==='ArrowUp')    { keys.up=true; changed=true; }
  if (e.key==='s'||e.key==='ArrowDown')  { keys.down=true; changed=true; }
  if (e.key==='q'||e.key==='ArrowLeft')  { keys.left=true; changed=true; }
  if (e.key==='d'||e.key==='ArrowRight') { keys.right=true; changed=true; }
  if (e.key==='e') useUlti1();
  if (e.key==='r') { e.preventDefault(); useUlti2(); }
  if (changed) socket.emit('keys', { code: myCode, keys });
});
window.addEventListener('keyup', e => {
  let changed = false;
  if (e.key==='z'||e.key==='ArrowUp')    { keys.up=false; changed=true; }
  if (e.key==='s'||e.key==='ArrowDown')  { keys.down=false; changed=true; }
  if (e.key==='q'||e.key==='ArrowLeft')  { keys.left=false; changed=true; }
  if (e.key==='d'||e.key==='ArrowRight') { keys.right=false; changed=true; }
  if (changed) socket.emit('keys', { code: myCode, keys });
});

// Socket events
socket.on('room_created', ({ code }) => {
  myId = socket.id; myCode = code; isHost = true;
  document.getElementById('lobby-code-display').textContent = code;
  showScreen('lobby-screen');
});

socket.on('room_joined', ({ code }) => {
  myId = socket.id; myCode = code; isHost = false;
  document.getElementById('lobby-code-display').textContent = code;
  showScreen('lobby-screen');
});

socket.on('lobby_update', ({ players, hostId }) => {
  isHost = socket.id === hostId;
  document.getElementById('lobby-host-wrap').style.display = isHost ? 'block' : 'none';
  document.getElementById('lobby-wait').style.display = isHost ? 'none' : 'block';
  const list = document.getElementById('lobby-players');
  list.innerHTML = '';
  players.forEach(p => {
    const chip = document.createElement('div');
    chip.className = 'p-chip';
    chip.style.color = p.color;
    chip.style.borderColor = p.color + '80';
    chip.textContent = p.name + (p.id === hostId ? ' 👑' : '');
    list.appendChild(chip);
  });
});

socket.on('game_starting', () => {
  showScreen('game-screen');
  document.getElementById('death-overlay').style.display = 'none';
  gameActive = false;
  ulti1Ready = true; ulti2Ready = true;
  updateUltiBtn(1); updateUltiBtn(2);
  // Countdown
  const cd = document.getElementById('countdown');
  cd.style.display = 'flex';
  let n = 3;
  cd.textContent = n;
  const iv = setInterval(() => {
    n--;
    if (n <= 0) { cd.style.display = 'none'; gameActive = true; clearInterval(iv); }
    else cd.textContent = n;
  }, 1000);
});

socket.on('tick', (state) => {
  renderFrame(state);
  document.getElementById('hud-time').textContent = Math.floor(state.elapsed) + 's';
  // Players list
  const list = document.getElementById('players-list');
  list.innerHTML = '';
  state.players.forEach(p => {
    const row = document.createElement('div');
    row.className = 'p-row' + (p.alive ? '' : ' p-dead');
    row.innerHTML = `<div class="p-dot" style="background:${p.color}"></div><span>${p.name}</span>`;
    list.appendChild(row);
  });
});

socket.on('player_died', ({ id, time, xp }) => {
  if (id === socket.id) {
    gameActive = false;
    document.getElementById('death-overlay').style.display = 'flex';
    document.getElementById('death-time').textContent = `Survie : ${time.toFixed(1)}s`;
    document.getElementById('death-xp').textContent = `+${xp} XP`;
    addXP(xp);
    profile.gamesPlayed++;
    saveProfile();
  }
});

socket.on('game_over', ({ scores }) => {
  showScreen('gameover-screen');
  const list = document.getElementById('scores-list');
  list.innerHTML = '';
  scores.forEach((s, i) => {
    const row = document.createElement('div');
    row.className = 'score-row';
    row.innerHTML = `
      <div class="score-rank ${i===0?'first':''}">${i===0?'🏆':i+1}</div>
      <div class="p-dot" style="background:${s.color};width:12px;height:12px;border-radius:50%;"></div>
      <div class="score-name">${s.name}</div>
      <div class="score-time">${s.time.toFixed(1)}s</div>
      <div class="score-xp">+${s.xp}xp</div>`;
    list.appendChild(row);
  });
  document.getElementById('go-host-wrap').style.display = isHost ? 'block' : 'none';
  document.getElementById('go-wait').style.display = isHost ? 'none' : 'block';
});

socket.on('ulti_used', ({ id, type }) => {
  if (id !== socket.id) notif(type === 'dash' ? '⚡ Dash !' : '❄️ Freeze !');
});

socket.on('error', ({ msg }) => {
  showErr('home-err', msg);
  showErr('lobby-err', msg);
});

document.getElementById('btn-restart').addEventListener('click', () => {
  socket.emit('start_game', { code: myCode });
});

// RENDER
let particles = [];

function renderFrame(state) {
  // Background
  ctx.fillStyle = '#07070f';
  ctx.fillRect(0, 0, ARENA_W, ARENA_H);

  // Grid
  ctx.strokeStyle = '#0f0f20';
  ctx.lineWidth = 1;
  for (let x = 0; x < ARENA_W; x += 50) {
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,ARENA_H); ctx.stroke();
  }
  for (let y = 0; y < ARENA_H; y += 50) {
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(ARENA_W,y); ctx.stroke();
  }

  // Arena border glow
  ctx.strokeStyle = '#1a1a3e';
  ctx.lineWidth = 3;
  ctx.strokeRect(1, 1, ARENA_W-2, ARENA_H-2);

  // Danger balls
  state.dangerBalls.forEach(b => {
    ctx.save();
    ctx.shadowColor = b.frozen ? '#48dbfb' : b.color;
    ctx.shadowBlur = b.frozen ? 20 : 15;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
    ctx.fillStyle = b.frozen ? '#48dbfb80' : b.color;
    ctx.fill();
    ctx.strokeStyle = b.frozen ? '#48dbfb' : '#ffffff20';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();

    // Add particles
    if (Math.random() < 0.3) {
      particles.push({ x: b.x, y: b.y, vx: (Math.random()-.5)*2, vy: (Math.random()-.5)*2,
        life: 20, color: b.frozen ? '#48dbfb' : b.color, r: b.r * .3 });
    }
  });

  // Particles
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.life--;
    ctx.save();
    ctx.globalAlpha = p.life / 20;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * (p.life/20), 0, Math.PI*2);
    ctx.fillStyle = p.color;
    ctx.fill();
    ctx.restore();
  });

  // Players
  state.players.forEach(p => {
    if (!p.alive) return;

    // Trail
    if (p.trail && p.trail.length > 1) {
      for (let i = 1; i < p.trail.length; i++) {
        const alpha = i / p.trail.length * 0.6;
        const size = (i / p.trail.length) * 10;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.beginPath();
        ctx.arc(p.trail[i].x, p.trail[i].y, size, 0, Math.PI*2);
        ctx.fillStyle = p.color;
        ctx.fill();
        ctx.restore();
      }
    }

    // Dash ring
    if (p.dashing) {
      ctx.save();
      ctx.strokeStyle = p.color;
      ctx.lineWidth = 3;
      ctx.globalAlpha = .6;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 28, 0, Math.PI*2);
      ctx.stroke();
      ctx.restore();
    }

    // Shadow
    ctx.save();
    ctx.shadowColor = p.color;
    ctx.shadowBlur = p.id === socket.id ? 25 : 15;

    // Body
    ctx.beginPath();
    ctx.arc(p.x, p.y, 14, 0, Math.PI*2);
    ctx.fillStyle = p.color;
    ctx.fill();

    // Inner highlight
    ctx.beginPath();
    ctx.arc(p.x - 4, p.y - 4, 5, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fill();
    ctx.restore();

    // Name
    ctx.fillStyle = p.id === socket.id ? '#ffffff' : '#aaa';
    ctx.font = `${p.id === socket.id ? '700' : '500'} 11px DM Sans`;
    ctx.textAlign = 'center';
    ctx.fillText(p.name, p.x, p.y - 20);
  });
}

// Utils
function showErr(id, msg) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg;
  setTimeout(() => { el.textContent = ''; }, 3000);
}

function notif(msg) {
  const el = document.createElement('div');
  el.className = 'notif';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

updateXPBar();
</script>
</body>
</html>
